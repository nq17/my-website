  <p>Fill out the form below to get in touch with us.</p>

  <form method="post" action="https://webdevbasics.net/scripts/demo.php">

    Name:<br>
    <input type="text" name="myName" id="myName"><br><br>

    <label id="emailLabel" onmouseover="emailMessage()" onmouseout="blankMessage()">Email:</label><br>
    <input type="text" name="myEmail" id="myEmail"><br><br>

    Topics you are interested in:<br>
    <input type="checkbox" name="depression" id="depression" value="yes">

    <label for="anxiety">Anxiety</label><br>
    <input type="checkbox" name="selfcare" id="selfcare" value="yes">

    <input type="radio" name="mailinglist" id="mailinglistyes" value="yes">
    <label for="mailinglistyes">Yes</label><br>
    <input type="radio" name="mailinglist" id="mailinglistno" value="no">
    <label for="mailinglistno">No</label><br><br>

    Comments:<br>
    <textarea name="comments" rows="5" cols="40"></textarea><br><br>

    <input type="submit" value="Submit">
